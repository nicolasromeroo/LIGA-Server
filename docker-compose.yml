version: '3.8'

services:
  postgres:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: footsport
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/footsport
      - JWT_SECRET=your_jwt_secret_here
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - SPORTDB_BASE_URL=${SPORTDB_BASE_URL}
      - SPORTDB_API_KEY=${SPORTDB_API_KEY}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: